<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Financiero</title>
    <!-- Vinculación de estilos -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/historial.css" /> 
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

    <div id="contenedor-global">
        
        <!-- Encabezado Principal -->
        <header id="header-dashboard">
            <h1 id="titulo-principal">Mi Capital</h1>
            <p id="subtitulo">Gestión de Ingresos y Gastos</p>
        </header>

        <!-- Bloque de Tarjetas de Resumen (Visual) -->
        <section id="resumen-tarjetas">
            <div class="tarjeta-balance balance-total">
                <h3>Balance General</h3>
                <p class="monto-resumen" id="resumen-total">$ 0</p>
            </div>
            <div class="tarjeta-balance balance-ingreso">
                <h3>Total Ingresos</h3>
                <p class="monto-resumen" id="resumen-ingresos">+ $ 0</p>
            </div>
            <div class="tarjeta-balance balance-gasto">
                <h3>Total Gastos</h3>
                <p class="monto-resumen" id="resumen-gastos">- $ 0</p>
            </div>
        </section>

        <!-- Espacio de trabajo en dos columnas -->
        <main id="panel-principal">
            
            <!-- Columna Izquierda: Formulario -->
            <section class="columna-panel">
                <div class="contenedor-bloque">
                    <h2>Nueva Operación</h2>
                    <div id="formulario-registro">
                        <div class="campo-grupo">
                            <label for="monto">Monto de la transacción</label>
                            <input type="number" id="monto" placeholder="0.00" min="0" step="0.01" />
                        </div>

                        <div class="campo-grupo">
                            <label for="categoria">Categoría</label>
                            <select id="categoria">
                                <option value="salario">Salario / Honorarios</option>
                                <option value="arriendo">Arriendo</option>
                                <option value="alimentacion">Alimentación</option>
                                <option value="transporte">Transporte</option>
                                <option value="salud">Salud</option>
                                <option value="entretenimiento">Entretenimiento</option>
                                <option value="servicios">Servicios Públicos</option>
                                <option value="educacion">Educación</option>
                                <option value="otro">Otro gasto/ingreso</option>
                            </select>
                        </div>

                        <div class="campo-grupo">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha" />
                        </div>

                        <div id="acciones-formulario">
                            <button id="boton-ingresos" class="btn btn-verde">Registrar Ingreso</button>
                            <button id="boton-gastos" class="btn btn-rojo">Registrar Gasto</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Columna Derecha: Historial -->
            <section class="columna-panel">
                <div class="contenedor-bloque">
                    <h2>Historial de Movimientos</h2>
                    <div id="lista-transacciones">
                        <!-- Los datos de la BD se inyectarán aquí dinámicamente -->
                    </div>
                </div>
            </section>

        </main>

    </div>

    <!-- Scripts de control -->
    <script src="js/historial.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
